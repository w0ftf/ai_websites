<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/okta-agent-site

    <Directory /var/www/okta-agent-site>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:5001/api/
    ProxyPassReverse /api/ http://127.0.0.1:5001/api/

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection "1; mode=block"

    ErrorLog  ${APACHE_LOG_DIR}/okta-agent-site-error.log
    CustomLog ${APACHE_LOG_DIR}/okta-agent-site-access.log combined
</VirtualHost>
