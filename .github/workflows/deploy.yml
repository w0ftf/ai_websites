name: Deploy Okta Agent

on:
   workflow_dispatch:
    # Optional: Define inputs that users can provide when running the workflow
    inputs:
      reason:
        description: 'Reason for manual run'
        required: true
        default: 'Routine check'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: sudo docker build -t okta-agent:latest .

      - name: Stop existing container
        run: sudo docker rm -f okta-agent || true

      - name: Start container
        run: |
          sudo docker run -d \
            --name okta-agent \
            --restart unless-stopped \
            -p 8080:8080 \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e OKTA_API_TOKEN="${{ secrets.OKTA_API_TOKEN }}" \
            -e OKTA_DOMAIN="${{ secrets.OKTA_DOMAIN }}" \
            okta-agent:latest
